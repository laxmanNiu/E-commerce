<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEase | Product Details</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/products.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>

<body id="productDetailsPage">
    <div id="navbar-placeholder"></div>
    <main class="page-content">
        <section class="product-details">
            <div class="details-left">
                <img id="detailImage" alt="Product Image">
                <div class="thumbnail-row" id="detailThumbnails"></div>
            </div>
            <div class="details-right">
                <h1 id="detailTitle"></h1>
                <p id="detailDescription"></p>
                <div class="price-rating">
                    <span class="price" id="detailPrice"></span>
                    <span class="rating" id="detailRating"></span>
                </div>
                <button class="button" id="addToCartBtn">Add To Cart</button>
                <div class="related-products">
                    <h3>Related Products</h3>
                    <div class="product-grid" id="relatedProducts"></div>
                </div>
            </div>
        </section>
    </main>
    <div id="footer-placeholder"></div>
    <div id="scroll-top-placeholder"></div>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/products.js"></script>
</body>

</html>
