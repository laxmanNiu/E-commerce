<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' https://images.unsplash.com https://images.pexels.com; connect-src 'self';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEase | Register</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>

<body id="registerPage">
    <div id="navbar-placeholder"></div>
    <main class="page-content">
        <section class="auth-section">
            <div class="auth-card">
                <h2>Create Your Account</h2>
                <p>Register once to save orders, manage your profile, and checkout faster.</p>
                <form id="registerForm">
                    <label>Name<input type="text" id="registerName" required></label>
                    <label>Email<input type="email" id="registerEmail" required></label>
                    <label>Password<input type="password" id="registerPassword" required></label>
                    <label>Confirm Password<input type="password" id="registerConfirmPassword" required></label>
                    <button type="submit" class="button">Register</button>
                    <p id="authMessage" class="error-message"></p>
                </form>
                <p class="auth-note">Already registered? <a href="login.html">Login instead</a>.</p>
            </div>
        </section>
    </main>
    <div id="footer-placeholder"></div>
    <div id="scroll-top-placeholder"></div>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
