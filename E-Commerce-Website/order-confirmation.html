<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEase | Order Confirmation</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/home.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>

<body id="orderConfirmationPage">
    <div id="navbar-placeholder"></div>
    <main class="page-content">
        <section class="confirmation-section">
            <div class="confirmation-panel">
                <div class="status-icon">✓</div>
                <div class="confirmation-copy">
                    <h2>Thank you for your order!</h2>
                    <p>Your order has been placed successfully. We will email you the tracking details shortly.</p>
                    <p class="order-meta">Order <strong id="orderNumber">#ORD00000</strong></p>
                    <p class="order-meta">Status: <strong id="orderStatus">Confirmed</strong></p>
                </div>
            </div>
            <div id="confirmationSummary"></div>
            <a href="index.html" class="button">Continue Shopping</a>
        </section>
    </main>
    <div id="footer-placeholder"></div>
    <div id="scroll-top-placeholder"></div>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/order-confirmation.js"></script>
</body>

</html>
