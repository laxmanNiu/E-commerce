<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEase | Contact</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/home.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>

<body id="contactPage">
    <div id="navbar-placeholder"></div>
    <main class="page-content">
        <section class="contact-section">
            <div class="contact-grid">
                <div class="contact-info">
                    <h2>Contact Info</h2>
                    <div class="contact-card">
                        <h3>Email</h3>
                        <p>support@shopease.com</p>
                    </div>
                    <div class="contact-card">
                        <h3>Phone</h3>
                        <p>+1 (555) 012-3456</p>
                    </div>
                    <div class="contact-card">
                        <h3>Address</h3>
                        <p>123 Market Street, Suite 400, Example City</p>
                    </div>
                </div>
                <div class="contact-form-card">
                    <h2>Send a Message</h2>
                    <form id="contactForm">
                        <label>Name<input type="text" id="contactName" required></label>
                        <label>Email<input type="email" id="contactEmail" required></label>
                        <label>Subject<input type="text" id="contactSubject" required></label>
                        <label>Message<textarea id="contactMessage" rows="5" required></textarea></label>
                        <button type="submit" class="button">Send Message</button>
                        <p id="contactError" class="error-message"></p>
                        <p id="contactSuccess" class="success-message"></p>
                    </form>
                </div>
            </div>
        </section>
    </main>
    <div id="footer-placeholder"></div>
    <div id="scroll-top-placeholder"></div>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/contact.js"></script>
</body>

</html>
