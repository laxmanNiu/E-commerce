<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' https://images.unsplash.com https://images.pexels.com; connect-src 'self';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEase | Login</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>

<body id="loginPage">
    <div id="navbar-placeholder"></div>
    <main class="page-content">
        <section class="auth-section">
            <div class="auth-card">
                <h2>Welcome Back</h2>
                <p>Login to access your profile, order history, and faster checkout.</p>
                <form id="loginForm">
                    <label>Email<input type="email" id="loginEmail" required></label>
                    <label>Password<input type="password" id="loginPassword" required></label>
                    <button type="submit" class="button">Login</button>
                    <p id="authMessage" class="error-message"></p>
                </form>
                <p class="auth-note">New here? <a href="register.html">Create an account</a>.</p>
            </div>
        </section>
    </main>
    <div id="footer-placeholder"></div>
    <div id="scroll-top-placeholder"></div>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
