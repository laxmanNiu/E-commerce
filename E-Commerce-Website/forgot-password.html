<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEase | Forgot Password</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>

<body id="forgotPasswordPage">
    <div id="navbar-placeholder"></div>
    <main class="page-content">
        <section class="auth-section">
            <div class="auth-card">
                <h2>Reset your password</h2>
                <p>Enter the email associated with your account and we'll send a secure reset link.</p>
                <form id="forgotForm">
                    <label>Email<input type="email" id="forgotEmail" required></label>
                    <button type="submit" class="button">Send reset link</button>
                    <p id="forgotMessage" class="success-message"></p>
                </form>
                <p class="auth-note"><a href="login.html">Back to login</a></p>
            </div>
        </section>
    </main>
    <div id="footer-placeholder"></div>
    <div id="scroll-top-placeholder"></div>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
