<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEase | Reset Password</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>

<body id="resetPasswordPage">
    <div id="navbar-placeholder"></div>
    <main class="page-content">
        <section class="auth-section">
            <div class="auth-card">
                <h2>Create a new password</h2>
                <p>Set a new password for your account.</p>
                <form id="resetForm">
                    <label>New password
                        <div class="password-field">
                            <input type="password" id="resetPassword" required>
                            <button type="button" class="password-toggle" data-target="resetPassword">👁</button>
                        </div>
                    </label>
                    <label>Confirm password
                        <div class="password-field">
                            <input type="password" id="resetConfirmPassword" required>
                            <button type="button" class="password-toggle" data-target="resetConfirmPassword">👁</button>
                        </div>
                    </label>
                    <input type="hidden" id="resetToken">
                    <button type="submit" class="button">Set new password</button>
                    <p id="resetMessage" class="error-message"></p>
                </form>
                <p class="auth-note"><a href="login.html">Back to login</a></p>
            </div>
        </section>
    </main>
    <div id="footer-placeholder"></div>
    <div id="scroll-top-placeholder"></div>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
