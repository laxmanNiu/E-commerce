<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEase | Search</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/products.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>

<body id="searchPage">
    <div id="navbar-placeholder"></div>
    <main class="page-content">
        <section class="search-section">
            <h2>Search Products</h2>
            <p class="search-note">Start typing to see live product results.</p>
            <div class="search-bar">
                <input type="search" id="searchInput" placeholder="Search for products...">
                <button id="searchBtn" class="button">Search</button>
            </div>
            <p id="searchStatus" class="search-status">Type any keyword to begin.</p>
            <div class="product-grid" id="searchResults"></div>
        </section>
    </main>
    <div id="footer-placeholder"></div>
    <div id="scroll-top-placeholder"></div>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/search.js"></script>
</body>

</html>
